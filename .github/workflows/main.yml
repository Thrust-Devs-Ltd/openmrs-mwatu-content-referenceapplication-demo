name: Build and Publish with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          # This creates a temporary settings.xml mapped to the 'thrust-devs-content-repo' server ID
          server-id: thrust-devs-content-repo
          settings-path: ${{ github.workspace }}

      - name: Build and Verify
        run: mvn clean verify --batch-mode --file pom.xml

      - name: Publish to GitHub Packages
        # Only deploy on pushes to main, not on Pull Requests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mvn deploy -DskipTests --batch-mode -s ${{ github.workspace }}/settings.xml
        env:
          GITHUB_USERNAME: ${{ secrets.ORG_PUBLISH_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.ORG_PUBLISH_TOKEN }}